<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Prenotazione Espositori</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section id="prenotazione-espositore">
  <div id="app">
    <div class="app-header">Prenotazione Espositori</div>

    <div class="card">
      
      <div class="field">
        <label class="field-label" for="espositore">Scegli Espositore</label>
        <select class="field-input" id="espositore">
          <option value="A">Espositore A</option>
          <option value="B">Espositore B</option>
        </select>
      </div>

      <div class="field">
        <label class="field-label" for="date">Data</label>
        <input class="field-input" type="date" id="date">
      </div>

      <div class="field time-row">
        <div class="time-col">
          <label class="field-label" for="start">Inizio ⏱️</label>
          <div class="time-inner">
            <input class="field-input" type="time" id="start">
          </div>
        </div>
        <div class="time-col">
          <label class="field-label" for="end">Fine ⏱️</label>
          <div class="time-inner">
            <input class="field-input" type="time" id="end">
          </div>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="name">Il tuo Nome</label>
        <input class="field-input" type="text" id="name" placeholder="Inserisci nome e cognome" minlength="3">
      </div>

      <div class="field">
        <label class="field-label" for="postazione">Postazione (Luogo)</label>
        <select class="field-input" id="postazione">
          <option value="1">Postazione 1</option>
          <option value="2">Postazione 2</option>
          <option value="3">Postazione 3</option>
          <option value="4">Postazione 4</option>
          <option value="5">Postazione 5</option>
          <option value="6">Postazione 6</option>
          <option value="7">Postazione 7</option>
          <option value="8">Postazione 8</option>
        </select>
      </div>

      <button id="openPostazioni" class="postazioni-inline-btn">📍 Dove sono le postazioni?</button>
    </div>

    <div id="status">
      <span id="msg"></span>
    </div>

    <div id="formContainer">
      <div id="detailsPanel"></div>
      
      <div id="suggestions" style="display:none; margin-bottom:15px; padding: 0 15px;">
        <p style="font-size:13px; font-weight:bold; margin-bottom:5px;">Orari liberi consigliati:</p>
        <div id="suggestList"></div>
      </div>

      <button id="check">Controlla la disponibilità</button>
      <button id="send" disabled>Invia la prenotazione</button>
    </div>

    <h3 class="title" style="margin: 25px 0 10px 15px;">Riepilogo prenotazioni</h3>
    <div class="update-wrap" style="text-align:right; padding-right:15px; margin-bottom:10px;">
        <button class="secondary" style="width:auto; font-size:12px; padding:5px 12px; border-radius: 20px;" onclick="caricaRiepilogo()">🔄 Aggiorna</button>
    </div>
    <div id="riepilogo"></div>

    <div id="confirmModal">
      <div id="confirmBox">
        <h3 style="margin-top:0;">Confermi?</h3>
        <p id="confirmText" style="font-size:14px; line-height:1.6;"></p>
        <div style="display:flex; gap:12px; margin-top:20px;">
          <button id="confirmYes" style="background:var(--success); color:white;">Conferma</button>
          <button id="confirmNo" class="secondary">Annulla</button>
        </div>
      </div>
    </div>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <span>Salvataggio...</span>
    </div>

    <div id="postazioniMenu">
      <div id="postazioniHeader" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--ios-border); padding-bottom:15px; margin-bottom:15px;">
        <strong style="font-size:18px;">Mappa Postazioni</strong>
        <button id="closePostazioni" class="secondary" style="width:auto; padding:5px 15px;">Chiudi</button>
      </div>
      <div id="postazioniList"></div>
    </div>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
