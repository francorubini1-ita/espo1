<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Prenotazione Espositori</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section id="prenotazione-espositore">
  <div id="app">
    <div class="app-header">Prenotazione Espositori</div>

    <div class="card">
      <div class="field">
        <label class="field-label" for="espositore">Scegli Espositore</label>
        <select class="field-input" id="espositore">
          <option value="A">Espositore A</option>
          <option value="B">Espositore B</option>
        </select>
      </div>

      <div class="field">
        <label class="field-label" for="date">Data</label>
        <input class="field-input" type="date" id="date">
      </div>

      <div class="field time-row">
        <div class="time-col">
          <label class="field-label" for="start">Inizio</label>
          <input class="field-input" type="time" id="start">
        </div>
        <div class="time-col">
          <label class="field-label" for="end">Fine</label>
          <input class="field-input" type="time" id="end">
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="name">Il tuo Nome</label>
        <input class="field-input" type="text" id="name" placeholder="Inserisci nome e cognome">
      </div>

      <div class="field">
        <label class="field-label" for="postazione">Postazione</label>
        <select class="field-input" id="postazione">
          <option value="1">Postazione 1</option>
          <option value="2">Postazione 2</option>
          <option value="3">Postazione 3</option>
          <option value="4">Postazione 4</option>
          <option value="5">Postazione 5</option>
          <option value="6">Postazione 6</option>
          <option value="7">Postazione 7</option>
          <option value="8">Postazione 8</option>
        </select>
      </div>
      <button id="openPostazioni" class="postazioni-inline-btn">📍 Mappa Postazioni</button>
    </div>

    <div id="formContainer">
      <button id="check">Controlla disponibilità</button>
      <button id="send" disabled>Invia prenotazione</button>
    </div>

    <h3 class="title" style="margin: 35px 15px 10px; font-size: 26px;">Riepilogo prenotazioni</h3>
    <div id="riepilogo"></div>

    <div id="loadingOverlay" class="glass-pane">
        <div class="spinner"></div>
        <span>Salvataggio in corso...</span>
    </div>

    <div id="checkingOverlay" class="glass-pane">
        <div class="spinner"></div>
        <span>Verifica disponibilità...</span>
    </div>

    <div id="confirmModal">
      <div id="confirmBox">
        <h3>Confermi i dati?</h3>
        <p id="confirmText"></p>
        <div style="display:flex; gap:15px; margin-top:25px;">
          <button id="confirmYes" style="background:var(--success); color:white;">Conferma</button>
          <button id="confirmNo" class="secondary">Annulla</button>
        </div>
      </div>
    </div>

    <div id="postazioniMenu">
      <div id="postazioniHeader">
        <strong>Mappe GPS</strong>
        <button id="closePostazioni" class="secondary" style="width:auto;">Chiudi</button>
      </div>
      <div id="postazioniList"></div>
    </div>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
